name: career_ai
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.0.7
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  pdf: ^3.10.4
  printing: ^5.12.0
  path_provider: ^2.1.2
  http: ^1.2.0
  google_fonts: ^6.2.1
  google_sign_in: ^7.2.0
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  flutter_local_notifications: ^17.1.2
  android_intent_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices.
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

